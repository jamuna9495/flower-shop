<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Garden - Premium Flower Shop</title>
    <style>
        /* CSS SECTION */
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary-pink: #ff4d6d;
            --soft-bg: #fff5f7;
            --dark: #2d3436;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: var(--soft-bg);
            color: var(--dark);
        }

        .hidden { display: none !important; }

        /* Login Styling */
        .login-page {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(255, 77, 109, 0.8), rgba(255, 143, 163, 0.8)), 
                        url('https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&q=80');
            background-size: cover;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary-pink);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #c9184a; transform: scale(1.02); }

        /* Shop Styling */
        header {
            background: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-family: 'Playfair Display', serif; color: var(--primary-pink); font-size: 1.8rem; }

        .flower-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 40px 5%;
        }

        .flower-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: 0.4s;
            text-align: center;
        }

        .flower-card:hover { transform: translateY(-10px); }

        .flower-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .flower-card h3 { margin: 15px 0 5px; }
        .price { color: var(--primary-pink); font-weight: 600; font-size: 1.2rem; }

        .add-cart-btn {
            width: 80%;
            margin: 15px 0;
            background: #2d3436;
        }

        .cart-status { background: #f8f9fa; padding: 10px 20px; border-radius: 30px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2 style="color: #ff4d6d;">🌸 Glow Garden</h2>
            <p>Admin Login</p>
            <input type="text" id="username" placeholder="Username (admin)">
            <input type="password" id="password" placeholder="Password (123)">
            <button onclick="handleLogin()">Enter Shop</button>
        </div>
    </div>

    <div id="shopPage" class="hidden">
        <header>
            <div class="logo">Glow Garden</div>
            <div class="cart-status">🛒 Cart: <span id="cartCount">0</span></div>
            <button onclick="location.reload()" style="width: auto; background: #666; padding: 8px 15px;">Logout</button>
        </header>

        <h1 style="text-align: center; margin-top: 30px; font-family: 'Playfair Display';">Fresh Blossoms</h1>

        <div class="flower-grid" id="flowerGrid">
            </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        const flowers = [
            { name: "Red Rose", price: "₹299", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/images.jpg" },
            { name: "Sun Flower", price: "₹199", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175525.png" },
            { name: "White Lily", price: "₹399", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175449.png" },
            { name: "Tulips", price: "₹450", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175621.png" },
            { name: "Lavender", price: "₹350", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175800.png" },
            { name: "Orchids", price: "₹899", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175709.png" },
            { name: "Daisy", price: "₹250", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175956.png" },
            { name: "Hibiscus", price: "₹200", img:"https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20180033.png"  },
            { name: "Jasmine", price: "₹150", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175837.png" },
            { name: "Marigold", price: "₹100", img: "https://uploads.onecompiler.io/44e6zubpt/44ecn957c/Screenshot%202026-02-22%20175920.png" }
        ];

        let cart = 0;

        function handleLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;

            if(u === "admin" && p === "123") {
                document.getElementById('loginPage').classList.add('hidden');
                document.getElementById('shopPage').classList.remove('hidden');
                loadFlowers();
            } else {
                alert("Please enter admin and 123");
            }
        }

        function loadFlowers() {
            const grid = document.getElementById('flowerGrid');
            grid.innerHTML = flowers.map(f => `
                <div class="flower-card">
                    <img src="${f.img}" alt="${f.name}">
                    <h3>${f.name}</h3>
                    <p class="price">${f.price}</p>
                    <button class="add-cart-btn" onclick="addToCart()">Add to Cart</button>
                </div>
            `).join('');
        }

        function addToCart() {
            cart++;
            document.getElementById('cartCount').innerText = cart;
        }
    </script>
</body>
</html>
